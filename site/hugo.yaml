  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: true
  UseHugoToc: true
  homeInfoParams:
    Title: "AI 工具，从安装到精通"
    Content: "不是翻译官方文档，是踩过坑之后的实战教程。每一步都有具体版本号、真实截图、可复现的命令。"

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
